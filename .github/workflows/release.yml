name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build desktop release
        run: npm run desktop:release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_APP_URL: https://hasbuen.github.io/Sinal/login/

      - name: Build Android APK
        run: npm run android:build
        env:
          NEXT_PUBLIC_API_URL: https://sinal-api.vercel.app/api/graphql
          NEXT_PUBLIC_BACKEND_ORIGIN: https://sinal-api.vercel.app
          NEXT_PUBLIC_ENABLE_WEBSOCKETS: "false"

      - name: Prepare Android asset
        run: npm run android:release:asset

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/android/sinal-android.apk
